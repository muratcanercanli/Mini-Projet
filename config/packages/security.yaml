security:
    role_hierarchy:
        ROLE_ADMIN: ROLE_USER

    password_hashers:
        App\Entity\User: 'auto'

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false
        main:
            lazy: true
            provider: app_user_provider
            form_login:
                login_path: app_login
                check_path: app_login
                default_target_path: app_home
            logout:
                path: app_logout
                target: app_home

    # Permissions par rôle :
    # ANONYME  → PUBLIC_ACCESS  : visualiser et acheter les articles en vente
    # ROLE_USER → ROLE_USER     : gérer ses propres articles + acheter
    # ROLE_ADMIN → ROLE_ADMIN   : gérer tous les articles en vente
    access_control:
        - { path: ^/login, roles: PUBLIC_ACCESS }
        - { path: ^/register, roles: PUBLIC_ACCESS }
        - { path: ^/admin, roles: ROLE_ADMIN }
        - { path: ^/product/new, roles: ROLE_USER }
        - { path: ^/product/\d+/edit, roles: ROLE_USER }
        - { path: ^/product/\d+/delete, roles: ROLE_USER }
        - { path: ^/cart, roles: ROLE_USER }
        - { path: ^/account, roles: ROLE_USER }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10